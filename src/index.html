<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Havi - Asistente Hey Banco</title>
    <style>
        :root {
            --primary-bg: #121212;
            --accent: #2e68ff; /* Azul tipo neo-banco */
            --chat-bg: #f5f7fa;
            --bot-msg: #ffffff;
            --text-main: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e4e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            height: 85vh;
            background: var(--chat-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header y Configuración */
        header {
            background-color: var(--primary-bg);
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        
        header h2 { margin: 0 0 10px 0; font-size: 1.2rem; font-weight: 600; }

        .settings {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .settings input {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            outline: none;
            width: 60%;
        }

        .btn-reset {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-reset:hover { background-color: #ff6b81; }

        /* Área del Chat */
        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.bot {
            background-color: var(--bot-msg);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .message.user {
            background-color: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            box-shadow: 0 2px 5px rgba(var(--accent), 0.3);
        }

        .message.system {
            background-color: transparent;
            color: #888;
            font-size: 0.8rem;
            align-self: center;
            text-align: center;
            box-shadow: none;
        }

        /* Input de mensajes */
        #input-area {
            background: white;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
        }

        #input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #e1e1e1;
            border-radius: 25px;
            outline: none;
            font-size: 0.95rem;
        }

        #input-area input:focus { border-color: var(--accent); }

        #input-area button {
            background-color: var(--accent);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        #input-area button:hover { transform: scale(1.05); }
        #input-area button:disabled { background-color: #a0a0a0; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <h2>Havi - Asistente Financiero</h2>
        <div class="settings">
            <input type="text" id="userId" placeholder="ID del Usuario (Ej. USR-00001)" value="">
            <button class="btn-reset" onclick="resetChat()">Reset</button>
        </div>
    </header>

    <div id="chat-window">
        <div class="message system">Ingresa un ID de usuario válido y envía un mensaje.</div>
    </div>

    <div id="input-area">
        <input type="text" id="userMessage" placeholder="Escribe tu mensaje..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8000"; // URL de tu backend en FastAPI
    const chatWindow = document.getElementById("chat-window");
    const inputMessage = document.getElementById("userMessage");
    const userIdInput = document.getElementById("userId");
    const sendBtn = document.getElementById("sendBtn");

    function appendMessage(sender, text) {
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message", sender);
        msgDiv.textContent = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
        const mensaje = inputMessage.value.trim();
        const user_id = userIdInput.value.trim();

        if (!mensaje || !user_id) {
            alert("Por favor ingresa un ID de usuario y un mensaje.");
            return;
        }

        // Mostrar mensaje del usuario en UI
        appendMessage("user", mensaje);
        inputMessage.value = "";
        
        // Deshabilitar botón mientras carga
        sendBtn.disabled = true;
        
        try {
            const response = await fetch(`${API_URL}/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: user_id, mensaje: mensaje })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || "Error en el servidor");
            }

            const data = await response.json();
            appendMessage("bot", data.respuesta);

        } catch (error) {
            appendMessage("system", "Error: " + error.message);
        } finally {
            sendBtn.disabled = false;
            inputMessage.focus();
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }

    async function resetChat() {
        const user_id = userIdInput.value.trim();
        if (!user_id) return;

        try {
            await fetch(`${API_URL}/reset`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: user_id })
            });
            chatWindow.innerHTML = '<div class="message system">El historial del chat ha sido borrado.</div>';
        } catch (error) {
            console.error("Error al resetear:", error);
        }
    }
</script>

</body>
</html>
